<!-- File: templates/text2speech.html -->
{% extends "base.html" %}

{% block title %}Text2Speech - FastAPI App{% endblock %}

{% block extra_css %}
<style>
    /* Lavender Aesthetic for Text2Speech Page */
    body {
        background: linear-gradient(135deg, #c9b8e8 0%, #e8d5f5 100%);
    }

    h1 {
        color: #7c5cbf;
    }

    .subtitle {
        color: #9b7fd4;
    }

    button {
        background: #7c5cbf;
    }

    button:hover {
        background: #6a4dab;
    }

    .info-section {
        border-left: 4px solid #9b7fd4;
    }

    .info-section h3 {
        color: #7c5cbf;
    }

    .output h3 {
        color: #7c5cbf;
    }

    .navbar {
        background: #f0e8ff;
    }

    .navbar a {
        color: #7c5cbf;
    }

    .navbar a:hover {
        background: #e6d9ff;
    }
</style>
{% endblock %}

{% block content %}
<h1>Text2Speech</h1>
<p class="subtitle">Convert text to natural-sounding speech</p>

<div class="info-section">
    <h3>Enter Your Text</h3>
    <textarea id="speechInput" rows="6" placeholder="Type or paste your text here..." style="width: 100%; padding: 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px;"></textarea>
    <button onclick="convertToSpeech()" style="margin-top: 10px;">Convert to Speech</button>
</div>

<div class="output" id="speechOutput" style="display: none;">
    <h3>Audio Player</h3>
    <audio id="audioPlayer" controls style="width: 100%;"></audio>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function convertToSpeech() {
    const text = document.getElementById("speechInput").value;

    if (!text.trim()) {
        alert("Please enter some text.");
        return;
    }

    try {
        const response = await fetch("/api/tts", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt: text })
        });

        if (!response.ok) throw new Error("TTS request failed");

        const audioBlob = await response.blob();
        const audioUrl = URL.createObjectURL(audioBlob);
        const player = document.getElementById("audioPlayer");
        player.src = audioUrl;
        document.getElementById("speechOutput").style.display = "block";
        player.play();
    } catch (error) {
        console.error(error);
        alert("Error generating speech.");
    }
}
</script>
{% endblock %}
